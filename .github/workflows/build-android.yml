name: Build Android

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEY_ALIAS:
        required: true
      ANDROID_STORE_PASSWORD:
        required: true
    outputs:
      artifact-name:
        description: "Name of the Android APK artifact"
        value: ${{ jobs.build-android.outputs.artifact-name }}

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.meta.outputs.artifact-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools & platforms
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Install .NET Android workload
        run: dotnet workload install android

      - name: Restore NuGet packages
        run: |
          dotnet restore src/Orpheus.Android/Orpheus.Android.csproj \
            -p:AndroidSdkDirectory="$ANDROID_HOME"

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > orpheus-release.jks

      - name: Publish APK (Release)
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGNING_STORE_PASS: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          dotnet publish src/Orpheus.Android/Orpheus.Android.csproj \
            --configuration Release \
            --framework net10.0-android \
            -p:AndroidSdkDirectory="$ANDROID_HOME" \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore="$(pwd)/orpheus-release.jks" \
            -p:AndroidSigningKeyAlias="$SIGNING_KEY_ALIAS" \
            -p:AndroidSigningStorePass="$SIGNING_STORE_PASS" \
            -p:AndroidSigningKeyPass="$SIGNING_STORE_PASS"

      - name: Locate APK
        id: locate-apk
        run: |
          apk=$(find src/Orpheus.Android -name "*-signed.apk" -o -name "*.apk" | grep -v unsigned | head -1)
          echo "apk-path=$apk" >> "$GITHUB_OUTPUT"

      - name: Set artifact metadata
        id: meta
        run: |
          name="OrpheusMP-${{ inputs.version }}-android"
          echo "artifact-name=$name" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          cp "${{ steps.locate-apk.outputs.apk-path }}" \
            "${{ steps.meta.outputs.artifact-name }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact-name }}
          path: ${{ steps.meta.outputs.artifact-name }}.apk
          retention-days: 7
