name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Compute version tag ───────────────────────────────────────────────────
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.gen.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version tag
        id: gen
        run: |
          DATE=$(date -u +%Y-%m-%d)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="v${DATE}-${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Generated tag: $TAG"

  # ── Build desktop platforms ───────────────────────────────────────────────
  desktop:
    name: Desktop builds
    needs: version
    uses: ./.github/workflows/build-desktop.yml
    with:
      version: ${{ needs.version.outputs.tag }}

  # ── Build Android APK ─────────────────────────────────────────────────────
  android:
    name: Android build
    needs: version
    uses: ./.github/workflows/build-android.yml
    with:
      version: ${{ needs.version.outputs.tag }}

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, desktop, android]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.desktop.outputs.windows-artifact }}
          path: artifacts/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.desktop.outputs.macos-artifact }}
          path: artifacts/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.desktop.outputs.linux-artifact }}
          path: artifacts/

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.android.outputs.artifact-name }}
          path: artifacts/

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "OrpheusMP ${{ needs.version.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
