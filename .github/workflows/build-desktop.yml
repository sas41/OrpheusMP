name: Build Desktop

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    outputs:
      windows-artifact:
        description: "Name of the Windows .msi artifact"
        value: ${{ jobs.build-windows.outputs.artifact-name }}
      windows-zip-artifact:
        description: "Name of the Windows .zip artifact"
        value: ${{ jobs.build-windows.outputs.zip-artifact-name }}
      macos-artifact:
        description: "Name of the macOS .pkg artifact"
        value: ${{ jobs.build-macos.outputs.artifact-name }}
      macos-zip-artifact:
        description: "Name of the macOS .zip artifact"
        value: ${{ jobs.build-macos.outputs.zip-artifact-name }}
      linux-artifact:
        description: "Name of the Linux .zip artifact"
        value: ${{ jobs.build-linux.outputs.artifact-name }}

jobs:
  # ── Windows — self-contained publish → WiX .msi ───────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    outputs:
      artifact-name: ${{ steps.meta.outputs.artifact-name }}
      zip-artifact-name: ${{ steps.meta.outputs.zip-artifact-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: |
          dotnet restore src/Orpheus.Desktop/Orpheus.Desktop.csproj `
            -p:DesktopOnly=true

      - name: Publish (self-contained, win-x64)
        run: |
          dotnet publish src/Orpheus.Desktop/Orpheus.Desktop.csproj `
            --configuration Release `
            --framework net10.0 `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:DesktopOnly=true `
            --output publish/windows

      - name: Install WiX v6
        run: dotnet tool update --global wix --version "6.0.2"

      - name: Generate MSI version
        id: msi-version
        shell: pwsh
        run: |
          # MSI requires four numeric fields (Major.Minor.Patch.Build).
          # GITHUB_RUN_NUMBER is a free, always-incrementing per-workflow
          # counter — no API calls or extra permissions needed.
          $datePart = (Get-Date -Format 'yy.MM.dd')
          $v        = "$datePart.${{ github.run_number }}"
          echo "value=$v" >> $env:GITHUB_OUTPUT

      - name: Build .msi
        shell: pwsh
        run: |
          wix build scripts/install/windows/OrpheusMP.wxs `
            -arch x64 `
            -d SourceDir=publish/windows `
            -d Version="${{ steps.msi-version.outputs.value }}" `
            -o "OrpheusMP-${{ inputs.version }}-windows-x64.msi"

      - name: Set artifact metadata
        id: meta
        shell: pwsh
        run: |
          $name = "OrpheusMP-${{ inputs.version }}-windows-x64"
          echo "artifact-name=$name" >> $env:GITHUB_OUTPUT
          echo "zip-artifact-name=$name-zip" >> $env:GITHUB_OUTPUT

      - name: Zip release
        shell: pwsh
        run: |
          $zipName = "${{ steps.meta.outputs.artifact-name }}"
          New-Item -ItemType Directory -Path "zip-stage/app" -Force | Out-Null
          Copy-Item -Recurse -Path "publish/windows/*" -Destination "zip-stage/app/"
          Compress-Archive -Path "zip-stage/*" -DestinationPath "$zipName.zip"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact-name }}
          path: ${{ steps.meta.outputs.artifact-name }}.msi
          retention-days: 7

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.zip-artifact-name }}
          path: ${{ steps.meta.outputs.artifact-name }}.zip
          retention-days: 7

  # ── macOS — universal binary → .app bundle → .pkg ─────────────────────────
  build-macos:
    name: macOS (arm64 + x64)
    runs-on: macos-latest
    outputs:
      artifact-name: ${{ steps.meta.outputs.artifact-name }}
      zip-artifact-name: ${{ steps.meta.outputs.zip-artifact-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: |
          dotnet restore src/Orpheus.Desktop/Orpheus.Desktop.csproj \
            -p:DesktopOnly=true

      - name: Publish arm64
        run: |
          dotnet publish src/Orpheus.Desktop/Orpheus.Desktop.csproj \
            --configuration Release \
            --framework net10.0 \
            --runtime osx-arm64 \
            --self-contained true \
            -p:DesktopOnly=true \
            --output publish/macos-arm64

      - name: Publish x64
        run: |
          dotnet publish src/Orpheus.Desktop/Orpheus.Desktop.csproj \
            --configuration Release \
            --framework net10.0 \
            --runtime osx-x64 \
            --self-contained true \
            -p:DesktopOnly=true \
            --output publish/macos-x64

      # Merge native executable slices into a universal binary
      - name: Create universal binary
        run: |
          mkdir -p publish/macos-universal
          cp -R publish/macos-arm64/. publish/macos-universal/
          lipo -create \
            publish/macos-arm64/Orpheus.Desktop \
            publish/macos-x64/Orpheus.Desktop \
            -output publish/macos-universal/Orpheus.Desktop
          chmod +x publish/macos-universal/Orpheus.Desktop

      - name: Set artifact metadata
        id: meta
        run: |
          name="OrpheusMP-${{ inputs.version }}-macos-universal"
          echo "artifact-name=$name" >> "$GITHUB_OUTPUT"
          echo "zip-artifact-name=$name-zip" >> "$GITHUB_OUTPUT"

      # build-pkg.sh wraps the publish output in a .app bundle and calls
      # pkgbuild + productbuild to produce a signed-ready .pkg installer.
      - name: Build .pkg
        run: |
          bash scripts/install/macos/build-pkg.sh \
            publish/macos-universal \
            "${{ inputs.version }}" \
            .

      - name: Zip release
        run: |
          mkdir -p zip-stage/app
          cp -R publish/macos-universal/. zip-stage/app/
          zip -r "${{ steps.meta.outputs.artifact-name }}.zip" zip-stage/

      - name: Upload pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact-name }}
          path: OrpheusMP-${{ inputs.version }}-macos.pkg
          retention-days: 7

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.zip-artifact-name }}
          path: ${{ steps.meta.outputs.artifact-name }}.zip
          retention-days: 7

  # ── Linux — self-contained publish → .zip (with install script) ───────────
  build-linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.meta.outputs.artifact-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # libvlc is system-installed on Linux — no NuGet package available
      - name: Install libvlc
        run: sudo apt-get update && sudo apt-get install -y libvlc-dev vlc

      - name: Restore
        run: |
          dotnet restore src/Orpheus.Desktop/Orpheus.Desktop.csproj \
            -p:DesktopOnly=true

      - name: Publish (self-contained, linux-x64)
        run: |
          dotnet publish src/Orpheus.Desktop/Orpheus.Desktop.csproj \
            --configuration Release \
            --framework net10.0 \
            --runtime linux-x64 \
            --self-contained true \
            -p:DesktopOnly=true \
            --output publish/linux

      - name: Stage zip layout
        run: |
          mkdir -p publish/linux-zip/app/assets
          cp -r publish/linux/. publish/linux-zip/app/
          cp scripts/install/install-linux.sh publish/linux-zip/
          cp assets/icon-256.png publish/linux-zip/app/assets/
          cp assets/icon.svg publish/linux-zip/app/assets/

      - name: Set artifact metadata
        id: meta
        run: |
          name="OrpheusMP-${{ inputs.version }}-linux-x64"
          echo "artifact-name=$name" >> "$GITHUB_OUTPUT"

      - name: Zip release
        run: |
          zip -r "${{ steps.meta.outputs.artifact-name }}.zip" publish/linux-zip/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact-name }}
          path: ${{ steps.meta.outputs.artifact-name }}.zip
          retention-days: 7
