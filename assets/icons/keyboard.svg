<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 100 100"
   fill="currentColor"
   version="1.1"
   width="100"
   height="100"
   xmlns="http://www.w3.org/2000/svg">
  <!-- Keyboard body -->
  <rect x="5" y="22" width="90" height="56" rx="6" ry="6"
        style="fill:none;stroke:currentColor;stroke-width:5" />
  <!-- Row 1 keys -->
  <rect x="14" y="30" width="10" height="10" rx="2" style="fill:currentColor" />
  <rect x="28" y="30" width="10" height="10" rx="2" style="fill:currentColor" />
  <rect x="42" y="30" width="10" height="10" rx="2" style="fill:currentColor" />
  <rect x="56" y="30" width="10" height="10" rx="2" style="fill:currentColor" />
  <rect x="70" y="30" width="16" height="10" rx="2" style="fill:currentColor" />
  <!-- Row 2 keys -->
  <rect x="14" y="44" width="10" height="10" rx="2" style="fill:currentColor" />
  <rect x="28" y="44" width="10" height="10" rx="2" style="fill:currentColor" />
  <rect x="42" y="44" width="10" height="10" rx="2" style="fill:currentColor" />
  <rect x="56" y="44" width="10" height="10" rx="2" style="fill:currentColor" />
  <rect x="70" y="44" width="16" height="10" rx="2" style="fill:currentColor" />
  <!-- Spacebar -->
  <rect x="14" y="58" width="44" height="10" rx="2" style="fill:currentColor" />
  <rect x="62" y="58" width="10" height="10" rx="2" style="fill:currentColor" />
  <rect x="76" y="58" width="10" height="10" rx="2" style="fill:currentColor" />
</svg>
